name: Build and deploy backend to Azure Web App - chatbot-factory-api-balkis

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  BACKEND_PATH: backend
  AZURE_WEBAPP_NAME: chatbot-factory-api-balkis

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          python -m venv antenv
          source antenv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend imports
        working-directory: ${{ env.BACKEND_PATH }}
        run: |
          source antenv/bin/activate
          python -m py_compile main.py database/db.py alembic/env.py

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: |
            backend
            !backend/antenv/
            !backend/.env
            !backend/.idea/
            !backend/venv/
            !backend/**/__pycache__/
            !backend/**/*.pyc

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: backend-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3B25ED8708D24EFD9DAD18752616FDBD }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1E1A178E85914CED9D327DE655A2B754 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_34F753E2CB704C888321A7C907C7CE3C }}

      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: backend-app/backend
          startup-command: alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker -w 2 -b 0.0.0.0:${PORT:-8000} main:app
