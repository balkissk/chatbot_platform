# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - chatbot-factory-frontend-balkis

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/*frontend*'
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'
  FRONTEND_PATH: frontend
  ANGULAR_DIST_PATH: dist/frontend
  AZURE_WEBAPP_NAME: chatbot-factory-frontend-balkis

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Build Angular frontend
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run build --if-present

      - name: Verify Angular SSR build output
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          test -f package.json
          test -d ${{ env.ANGULAR_DIST_PATH }}/browser
          test -f ${{ env.ANGULAR_DIST_PATH }}/server/server.mjs

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: ${{ env.FRONTEND_PATH }}
          include-hidden-files: false

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-app
          path: frontend-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8EFA9962857141C7AAA225BF25E136CB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0FBC1F1763D1469899525E7679C98F8F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DBA1076453184737BA4A25FB76265E91 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: frontend-app
          startup-command: node dist/frontend/server/server.mjs
          
