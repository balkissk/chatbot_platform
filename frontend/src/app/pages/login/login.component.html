<main class="auth-page">
  <section class="auth-panel">
    <div>
      <p class="eyebrow">INSOMEA</p>
      <h1>ChatBot Factory</h1>
      <p class="subtitle">Sign in to manage chatbot projects, knowledge bases, versions, and deployments.</p>
    </div>

    <form (ngSubmit)="login()" class="auth-form">
      <label>
        Email
        <input [(ngModel)]="email" name="email" type="email" autocomplete="email" required>
      </label>

      <label>
        Password
        <input [(ngModel)]="password" name="password" type="password" autocomplete="current-password" required>
      </label>

      <p *ngIf="error()" class="error">{{ error() }}</p>
      <p *ngIf="message()" class="success">{{ message() }}</p>

      <button type="submit" [disabled]="loading() || !email || !password">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>

      <a routerLink="/register">Create an account</a>
    </form>
  </section>
</main>
